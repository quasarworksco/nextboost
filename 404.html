<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — NextBoost</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg2); }
    .error-wrap { text-align:center; padding:40px 24px; max-width:480px; }
    .error-code { font-size:96px; font-weight:800; color:var(--blue); line-height:1; letter-spacing:-4px; }
    .error-title { font-size:24px; font-weight:700; color:var(--navy); margin:16px 0 8px; }
    .error-sub { color:var(--muted); font-size:15px; margin-bottom:32px; line-height:1.6; }
  </style>
</head>
<body>
<div class="error-wrap">
  <div class="error-code">404</div>
  <div class="error-title">Página no encontrada</div>
  <p class="error-sub">La página que buscas no existe o fue movida.<br>Vuelve al inicio y sigue creciendo.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a href="index.html" class="btn btn-primary">Ir al inicio</a>
    <a href="dashboard.html" class="btn btn-outline">Ir al panel</a>
  </div>
  <div style="margin-top:32px">
    <a href="index.html" class="logo" style="text-decoration:none;font-size:22px">Next<span>Boost</span></a>
  </div>
</div>
</body>
</html>
