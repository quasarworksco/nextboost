<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — NextBoost</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="logo">Next<span>Boost</span></a>
    </div>

    <!-- Step 1: email form -->
    <div id="step-form">
      <h2>Recuperar contraseña</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:24px">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

      <div id="alert-box"></div>

      <form id="forgot-form">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="email" class="input" placeholder="tu@email.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
          Enviar enlace
        </button>
      </form>
    </div>

    <!-- Step 2: success message -->
    <div id="step-success" style="display:none;text-align:center">
      <div style="width:64px;height:64px;background:var(--blue-xs);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style="margin-bottom:8px">Revisa tu correo</h2>
      <p style="color:var(--muted);font-size:14px;line-height:1.6">Enviamos un enlace de recuperación a<br><strong id="sent-email" style="color:var(--navy)"></strong></p>
      <p style="color:var(--muted);font-size:13px;margin-top:12px">Si no llega en unos minutos, revisa tu carpeta de spam.</p>
      <button class="btn btn-ghost btn-full mt-3" onclick="resetForm()">Intentar con otro correo</button>
    </div>

    <div style="text-align:center;font-size:14px;color:var(--muted);margin-top:24px">
      <a href="login.html" style="color:var(--blue);font-weight:600">Volver al inicio de sesión</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
  // If already logged in, redirect
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'dashboard.html';
  });

  const form    = document.getElementById('forgot-form');
  const alertEl = document.getElementById('alert-box');
  const btnEl   = document.getElementById('submit-btn');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    alertEl.innerHTML = '';
    const email = document.getElementById('email').value.trim();
    btnEl.disabled = true;
    btnEl.innerHTML = '<span class="spinner"></span> Enviando...';

    try {
      await auth.sendPasswordResetEmail(email);
      document.getElementById('sent-email').textContent = email;
      document.getElementById('step-form').style.display    = 'none';
      document.getElementById('step-success').style.display = 'block';
    } catch(err) {
      const msg = err.code === 'auth/user-not-found'
        ? 'No existe una cuenta con ese correo.'
        : err.code === 'auth/invalid-email'
        ? 'El correo no es válido.'
        : err.message;
      alertEl.innerHTML = `<div class="alert alert-error">${msg}</div>`;
      btnEl.disabled = false;
      btnEl.innerHTML = 'Enviar enlace';
    }
  });

  function resetForm() {
    document.getElementById('step-success').style.display = 'none';
    document.getElementById('step-form').style.display    = 'block';
    document.getElementById('email').value = '';
    alertEl.innerHTML = '';
    btnEl.disabled = false;
    btnEl.innerHTML = 'Enviar enlace';
  }
</script>
</body>
</html>
